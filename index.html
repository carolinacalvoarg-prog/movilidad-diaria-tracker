<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Movilidad">
  <title>Movilidad Diaria</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login View -->
  <div id="view-login" class="view active">
    <div class="login-container">
      <div class="app-logo">🏃</div>
      <h1>Movilidad Diaria</h1>
      <p class="login-subtitle">Registrá tus ejercicios diarios</p>
      <button id="btn-google-login" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"/>
          <path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"/>
          <path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34C2.85 17.09 2 20.45 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"/>
          <path fill="#EA4335" d="M24 10.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 4.18 29.93 2 24 2 15.4 2 7.96 6.93 4.34 14.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"/>
        </svg>
        Continuar con Google
      </button>
    </div>
  </div>

  <!-- Main View -->
  <div id="view-main" class="view">
    <header class="app-header">
      <h2 id="header-date">Hoy</h2>
      <div class="header-actions">
        <button class="icon-btn" id="btn-history" aria-label="Historial">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-logout" aria-label="Cerrar sesión">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>
    <main id="exercises-grid" class="exercises-grid"></main>
    <button id="btn-add-exercise" class="fab" aria-label="Agregar ejercicio">+</button>
  </div>

  <!-- History View -->
  <div id="view-history" class="view">
    <header class="app-header">
      <button class="icon-btn" id="btn-back-history" aria-label="Volver">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2>Historial</h2>
      <div style="width:38px"></div>
    </header>
    <div class="history-container">
      <div class="date-nav">
        <button class="icon-btn" id="btn-prev-day" aria-label="Día anterior">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span id="history-date-label"></span>
        <button class="icon-btn" id="btn-next-day" aria-label="Día siguiente">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <!-- Exercise Modal -->
  <div id="modal-exercise" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h3 id="modal-title">Nuevo ejercicio</h3>
      <div class="form-row">
        <div class="form-group form-group-icon">
          <label for="input-icon">Ícono</label>
          <input type="text" id="input-icon" placeholder="🏃" maxlength="2" autocomplete="off">
        </div>
        <div class="form-group form-group-grow">
          <label for="input-name">Nombre</label>
          <input type="text" id="input-name" placeholder="Ej: Caminata" autocomplete="off">
        </div>
      </div>
      <div class="modal-actions">
        <button id="btn-cancel-exercise" class="btn-secondary">Cancelar</button>
        <button id="btn-save-exercise" class="btn-primary">Guardar</button>
      </div>
      <button id="btn-delete-exercise" class="btn-danger hidden">Eliminar ejercicio</button>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- Toast -->
  <div id="toast" role="alert" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
